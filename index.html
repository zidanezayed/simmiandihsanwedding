<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wedding Invite</title>
    <style>
      :root {
        --bg-tint: rgba(255, 248, 244, 0.82);
        --ink: #111;
        --shadow: 0 24px 60px rgba(95, 58, 39, 0.22);
        --flower-left-width: min(49vw, 565px);
        --flower-right-width: min(36vw, 415px);
        --left-open-x: clamp(11rem, 24vw, 18rem);
        --right-open-x: clamp(15.75rem, 30.5vw, 24rem);
        --fade-delay: 850ms;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        color: var(--ink);
        font-family: "Baskerville", "Didot", "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
        background: #fff;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(var(--bg-tint), var(--bg-tint)),
          url("./Bkgd.jpg") center top / 1100px auto repeat;
        opacity: 0.95;
        z-index: -2;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 50% 23%, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0) 40%),
          radial-gradient(circle at 50% 59%, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0) 28%),
          radial-gradient(circle at 50% 79%, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0) 26%);
        z-index: -1;
      }

      .page {
        width: min(100%, 1220px);
        min-height: 100svh;
        margin: 0 auto;
        display: grid;
        justify-items: center;
        align-content: start;
        padding: 18px 12px 28px;
      }

      .hero {
        width: 100%;
        display: grid;
        place-items: center;
        position: relative;
        min-height: 37svh;
      }

      .flower-stage {
        position: relative;
        width: min(100%, 1080px);
        height: 35svh;
        min-height: 340px;
      }

      .center-bloom {
        position: absolute;
        left: 50%;
        top: 40%;
        width: min(58vw, 330px);
        aspect-ratio: 1 / 1.02;
        transform: translate(-50%, -50%);
        background:
          radial-gradient(circle at center,
            rgba(255, 255, 255, 0.86) 0%,
            rgba(255, 255, 255, 0.64) 40%,
            rgba(255, 255, 255, 0.2) 70%,
            rgba(255, 255, 255, 0) 100%);
        border-radius: 44% 56% 48% 52% / 48% 42% 58% 52%;
        box-shadow: 0 12px 28px rgba(93, 68, 48, 0.06);
        z-index: 0;
      }

      .flower {
        position: absolute;
        top: 40%;
        left: 50%;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 16px 28px rgba(82, 55, 32, 0.22));
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.86);
        transition:
          transform 1350ms cubic-bezier(0.16, 1, 0.3, 1),
          opacity 500ms ease;
        will-change: transform, opacity;
      }

      .flower.left {
        width: var(--flower-left-width);
        z-index: 2;
      }

      .flower.right {
        width: var(--flower-right-width);
        z-index: 1;
      }

      .monogram {
        position: absolute;
        left: 50%;
        top: 40%;
        transform: translate(-50%, -50%);
        display: block;
        width: clamp(92px, 11vw, 135px);
        height: auto;
        opacity: 0;
        transition: opacity 700ms ease var(--fade-delay);
        z-index: 1;
        user-select: none;
        pointer-events: none;
      }

      .flowers-open .flower {
        opacity: 1;
      }

      .flowers-open .flower.left {
        transform: translate(calc(-50% - var(--left-open-x)), -50%) scale(1);
      }

      .flowers-open .flower.right {
        transform: translate(calc(-50% + var(--right-open-x)), -50%) scale(1);
      }

      .flowers-open .monogram,
      .flowers-open .title,
      .flowers-open .names,
      .flowers-open .qr {
        opacity: 1;
      }

      .flowers-open .title,
      .flowers-open .names,
      .flowers-open .qr {
        transform: translateY(0);
      }

      .title-wrap,
      .names-wrap,
      .qr-wrap {
        width: 100%;
        display: grid;
        place-items: center;
        position: relative;
      }

      .title-wrap {
        margin-top: -74px;
      }

      .title {
        width: min(76vw, 640px);
        max-width: 100%;
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 700ms ease 1150ms,
          transform 700ms ease 1150ms;
      }

      .names-wrap {
        margin-top: 0;
        padding: 10px 0 10px;
      }

      .names-wrap::before {
        content: "";
        position: absolute;
        inset: -4px 2% -12px;
        background:
          linear-gradient(to bottom,
            rgba(255, 255, 255, 0.84),
            rgba(255, 255, 255, 0.55) 58%,
            rgba(255, 255, 255, 0));
        border-radius: 40px;
        filter: blur(6px);
        z-index: 0;
      }

      .names {
        position: relative;
        width: min(82vw, 620px);
        max-width: 100%;
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 700ms ease 1320ms,
          transform 700ms ease 1320ms;
        z-index: 1;
      }

      .qr-wrap {
        margin-top: 8px;
        padding: 20px 0 12px;
      }

      .qr-wrap::before {
        content: "";
        position: absolute;
        inset: 4px 1% -8px;
        background:
          linear-gradient(to bottom,
            rgba(255, 255, 255, 0.78),
            rgba(255, 255, 255, 0.45) 48%,
            rgba(255, 255, 255, 0) 100%);
        border-radius: 44px;
        filter: blur(9px);
        z-index: 0;
      }

      .qr {
        position: relative;
        width: min(86vw, 760px);
        max-width: 100%;
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 700ms ease 1490ms,
          transform 700ms ease 1490ms;
        z-index: 1;
      }

      @media (min-width: 700px) {
        .page {
          padding-top: 26px;
        }

        .hero {
          min-height: min(54svh, 760px);
          padding-top: 8px;
        }

        .flower-stage {
          height: min(52svh, 720px);
          min-height: 520px;
        }

        .center-bloom {
          width: clamp(250px, 25vw, 330px);
        }

        .monogram {
          width: clamp(120px, 13vw, 170px);
        }

        .title-wrap {
          margin-top: -84px;
        }

        .title {
          width: min(68vw, 760px);
        }

        .names {
          width: min(62vw, 760px);
        }

        .qr {
          width: min(72vw, 920px);
        }
      }

      @media (max-width: 640px) {
        :root {
          --flower-left-width: min(60vw, 470px);
          --flower-right-width: min(46vw, 340px);
          --left-open-x: clamp(7rem, 24vw, 9.2rem);
          --right-open-x: clamp(7.25rem, 20vw, 8.8rem);
        }

        .page {
          padding-bottom: 34px;
        }

        .title-wrap {
          margin-top: -28px;
        }

        .title {
          width: min(70vw, 460px);
        }

        .names {
          width: min(70vw, 500px);
        }

        .qr {
          width: min(82vw, 520px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .flower,
        .monogram,
        .title,
        .names,
        .qr {
          transition: none !important;
          animation: none !important;
        }

        .flower {
          opacity: 1;
        }

        .monogram,
        .title,
        .names,
        .qr {
          opacity: 1;
          transform: none;
        }

        .flowers-open .flower.left {
          transform: translate(calc(-50% - var(--left-open-x)), -50%) scale(1);
        }

        .flowers-open .flower.right {
          transform: translate(calc(-50% + var(--right-open-x)), -50%) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <main class="page" aria-label="Wedding invite">
      <section class="hero">
        <div class="flower-stage" aria-hidden="true">
          <div class="center-bloom"></div>
          <img class="flower left" src="./Left Flower.png" alt="" />
          <img class="flower right" src="./Right Flower.png" alt="" />
          <img class="monogram" src="./Middle SI.png" alt="S and I initials" />
        </div>
      </section>

      <section class="title-wrap" aria-label="Wedding title">
        <img class="title" src="./Wedding Title.png" alt="Wedding" />
      </section>

      <section class="names-wrap" aria-label="Couple names">
        <img class="names" src="./Names Transparent.png" alt="Simran Fazil with Ihsan Imthiaz" />
      </section>

      <section class="qr-wrap" aria-label="Wedding and venue QR codes">
        <img class="qr" src="./Wedding QR.png" alt="Wedding, reception, and parking QR codes with labels" />
      </section>
    </main>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const root = document.body;
        requestAnimationFrame(() => {
          root.classList.add("flowers-open");
        });
      });
    </script>
  </body>
</html>
